services:
  # Backend FastAPI Service
  - type: web
    name: evalyn-backend
    env: docker
    rootDir: backend
    plan: free # or your preferred plan
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: evalyn-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard
      # Add other necessary env vars here

  # Frontend Next.js Service
  - type: web
    name: evalyn-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: evalyn-backend
          property: host

databases:
  - name: evalyn-db
    plan: free
