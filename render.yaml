services:
  # Backend FastAPI Service
  - type: web
    name: evalyn-backend
    env: docker
    rootDir: backend
    plan: free # or your preferred plan
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: evalyn-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false # Set to https://evalyn-hr-automation-frontend.onrender.com

  # Frontend Next.js Service
  - type: web
    name: evalyn-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: evalyn-backend
          envVarKey: RENDER_EXTERNAL_URL


databases:
  - name: evalyn-db
    plan: free
